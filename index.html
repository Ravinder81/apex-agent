<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle APEX Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans',sans-serif;background:#f3f6fb;margin:0}
header{height:60px;background:#fff;border-bottom:1px solid #e2e8f4;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.logo{font-weight:700}
.layout{display:flex;height:calc(100vh - 60px)}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f4;padding:10px}
.main{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow-y:auto;padding:20px}
.input-area{padding:10px;background:#fff;border-top:1px solid #e2e8f4}
textarea{width:100%;resize:none;padding:10px;border-radius:8px;border:1px solid #cbd5e1}
button{padding:8px 12px;border-radius:6px;border:none;background:#1a56db;color:#fff;cursor:pointer}
.msg-user{text-align:right;margin-bottom:15px}
.u-bubble{display:inline-block;background:#1a56db;color:#fff;padding:10px 14px;border-radius:14px}
.msg-ai{display:flex;gap:10px;margin-bottom:20px}
.ai-body{background:#fff;border:1px solid #e2e8f4;border-radius:12px;padding:14px;width:100%}
</style>
</head>
<body>

<header>
  <div class="logo">Oracle APEX Agent</div>
  <div>APEX 24.2+</div>
</header>

<div class="layout">

  <aside class="sidebar">
    <button onclick="askQ('How to create an Interactive Report in Oracle APEX 24.2?')">Interactive Report</button><br><br>
    <button onclick="askQ('How to use APEX_COLLECTION API in Oracle APEX?')">Collections</button><br><br>
    <button onclick="askQ('How to create Dynamic Actions in Oracle APEX?')">Dynamic Actions</button>
  </aside>

  <main class="main">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea id="inp" rows="2" placeholder="Ask anything about Oracle APEX..."></textarea>
      <br><br>
      <button onclick="send()">Send</button>
    </div>
  </main>

</div>

<script>
let busy = false;

function esc(t){
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function askQ(q){
  document.getElementById('inp').value = q;
  send();
}

async function send(){
  if(busy) return;

  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if(!txt) return;

  busy = true;
  inp.value = '';

  const msgs = document.getElementById('messages');

  /* User bubble */
  const uDiv = document.createElement('div');
  uDiv.className = 'msg-user';
  uDiv.innerHTML = `<div class="u-bubble">${esc(txt)}</div>`;
  msgs.appendChild(uDiv);

  /* Loading bubble */
  const loading = document.createElement('div');
  loading.className = 'msg-ai';
  loading.innerHTML = `
    <div class="ai-body">
      🤖 Generating answer...
    </div>`;
  msgs.appendChild(loading);

  try{
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: txt })
    });

    const data = await res.json();
    loading.remove();

    if(!res.ok){
      throw new Error(data.error || "API Error");
    }

    const reply = data.reply || "No response received.";

    const aDiv = document.createElement('div');
    aDiv.className = 'msg-ai';
    aDiv.innerHTML = `
      <div class="ai-body">
        ${esc(reply)}
      </div>`;
    msgs.appendChild(aDiv);

  }catch(e){
    loading.remove();

    const eDiv = document.createElement('div');
    eDiv.className = 'msg-ai';
    eDiv.innerHTML = `
      <div class="ai-body" style="color:red;">
        ⚠️ ${esc(e.message)}
      </div>`;
    msgs.appendChild(eDiv);
  }

  busy = false;
  msgs.scrollTop = msgs.scrollHeight;
}
</script>

</body>
</html>
